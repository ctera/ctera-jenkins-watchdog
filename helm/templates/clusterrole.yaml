apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-watchdog-reader
  labels:
    {{- include "jenkins-watchdog.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, nodes, events, services, configmaps, secrets, namespaces, endpoints]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments, replicasets, daemonsets, statefulsets]
    verbs: [get, list]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list]
