{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "jenkins-watchdog.fullname" . }}-secrets
  labels:
    {{- include "jenkins-watchdog.labels" . | nindent 4 }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName }}
    kind: {{ .Values.externalSecrets.secretStoreKind }}
  target:
    name: {{ include "jenkins-watchdog.fullname" . }}-secrets
  data:
    {{- if .Values.externalSecrets.anthropicApiKey }}
    - secretKey: WATCHDOG_ANTHROPIC_API_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.anthropicApiKey }}
    {{- end }}
    {{- if .Values.externalSecrets.jenkinsToken }}
    - secretKey: WATCHDOG_JENKINS_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.jenkinsToken }}
    {{- end }}
    {{- if .Values.externalSecrets.oidcClientSecret }}
    - secretKey: WATCHDOG_OIDC_CLIENT_SECRET
      remoteRef:
        key: {{ .Values.externalSecrets.oidcClientSecret }}
    {{- end }}
    {{- if .Values.externalSecrets.jiraApiToken }}
    - secretKey: WATCHDOG_JIRA_API_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.jiraApiToken }}
    {{- end }}
{{- end }}
